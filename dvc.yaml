stages:
  prepare:
    cmd: python -m grnti_text_classifier.data.prepare --raw data/raw --out data/processed
    deps:
      - data/raw
      - src/grnti_text_classifier/data/prepare.py
    outs:
      - data/processed
  train:
    cmd: python -m grnti_text_classifier.training.train
    deps:
      - data/processed
      - src/grnti_text_classifier
      - configs
    params:
      - params.yaml:
    outs:
      - artifacts/checkpoints
    metrics:
      - reports/metrics.json:
          cache: false
