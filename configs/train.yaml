seed: 42
max_epochs: 5
batch_size: 16
lr: 2e-5
weight_decay: 0.01
warmup_ratio: 0.1
patience: 2
max_length: 256
num_workers: 0
processed_dir: data/processed
out_dir: artifacts/main

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
