name: lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Sync deps
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run --all-groups ruff check src tests scripts

      - name: Ruff format
        run: uv run --all-groups ruff format --check src tests scripts

      - name: Mypy
        run: uv run --all-groups mypy src scripts

      - name: Deptry
        run: uv run --all-groups deptry .

      - name: Bandit
        run: uv run --all-groups bandit -r src -c pyproject.toml

      - name: Interrogate
        run: uv run --all-groups interrogate -c pyproject.toml src

      - name: Codespell
        run: uv run --all-groups codespell

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
