services:
  api:
    build:
      context: .
    image: grnti-text-classifier:dev
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
    environment:
      GRNTI_MAIN_DIR: /app/artifacts/main/hf
      GRNTI_BASELINE_DIR: /app/artifacts/baseline/hf
      GRNTI_LABEL_ENCODER: /app/data/processed/label_encoder.json
      GRNTI_MODEL_VERSION: dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --backend-store-uri /mlruns --default-artifact-root /mlruns

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - monitoring
