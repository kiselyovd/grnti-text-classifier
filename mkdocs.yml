site_name: grnti-text-classifier
site_description: Production-grade Russian multi-class text classifier (GRNTI).
repo_url: https://github.com/kiselyovd/grnti-text-classifier
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.tabs
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - tables
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Training: training.md
  - Serving: serving.md
  - API reference: api.md
