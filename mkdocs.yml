site_name: grnti-text-classifier
site_description: Production-grade Russian multi-class text classifier (GRNTI).
repo_url: https://github.com/kiselyovd/grnti-text-classifier
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
    - scheme: slate
      primary: indigo
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.tabs
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - tables
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Training: training.md
  - Serving: serving.md
  - API reference: api.md
